services:
  app:
    build:
      context: .
      dockerfile: dockerFile
    container_name: faceid_app
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://faceid_user:faceid_pass@postgres:5432/faceid_db
    ports:
      - "8000:8000"
    volumes:
      - ./assets:/app/assets
      - ./database/face_database:/app/database/face_database
      - ./weights:/app/weights:ro
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/infer/status', timeout=3)\""]
      interval: 10s
      timeout: 5s
      retries: 10
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: dockerFile.gui
    container_name: faceid_frontend
    restart: unless-stopped
    environment:
      INTERNAL_API_BASE_URL: http://app:8000/api
      INTERNAL_WS_URL: ws://app:8000/ws/infer
      PUBLIC_FACE_BASE_URL: http://localhost:8000/faces
      GRADIO_SERVER_NAME: 0.0.0.0
      GRADIO_SERVER_PORT: 7860
    ports:
      - "7860:7860"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:7860', timeout=3)\""]
      interval: 10s
      timeout: 5s
      retries: 10
    depends_on:
      app:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: faceid_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: faceid_db
      POSTGRES_USER: faceid_user
      POSTGRES_PASSWORD: faceid_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U faceid_user -d faceid_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local